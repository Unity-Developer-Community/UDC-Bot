---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgloader-config
  namespace: udc-bot-dev
  labels:
    app.kubernetes.io/name: pgloader-migration
    app.kubernetes.io/part-of: udc-bot
    environment: dev
data:
  run-migration.sh: |
    #!/bin/sh
    set -e

    cat > /tmp/migration.load <<PGEOF
    LOAD DATABASE
      FROM mysql://root:${MYSQL_PASSWORD}@mysql.udc-bot-dev.svc.cluster.local:3306/udcbot
      INTO postgresql://udcbot:${POSTGRES_PASSWORD}@postgresql.udc-bot-dev.svc.cluster.local:5432/udcbot

    WITH data only,
        reset sequences,
        workers = 2, concurrency = 1

    SET maintenance_work_mem to '128MB'

    INCLUDING ONLY TABLE NAMES MATCHING ~/users|casino_users|token_transactions/

    ALTER SCHEMA 'udcbot' RENAME TO 'public'

    BEFORE LOAD DO
      \$\$ ALTER TABLE users ADD COLUMN IF NOT EXISTS birthday timestamp; \$\$,
      \$\$ DROP TABLE IF EXISTS token_transactions CASCADE; \$\$,
      \$\$ CREATE TABLE token_transactions (Id SERIAL PRIMARY KEY, UserID varchar(32) NOT NULL, TargetUserID varchar(32) DEFAULT NULL, Amount bigint NOT NULL, TransactionType varchar(50) NOT NULL, Description text DEFAULT NULL, CreatedAt timestamptz NOT NULL DEFAULT CURRENT_TIMESTAMP); \$\$,
      \$\$ CREATE INDEX IF NOT EXISTS idx_user_created ON token_transactions (UserID, CreatedAt); \$\$,
      \$\$ TRUNCATE users, casino_users CASCADE; \$\$

    AFTER LOAD DO
      \$\$ ALTER TABLE users DROP COLUMN IF EXISTS birthday; \$\$
    ;
    PGEOF

    echo "=== Starting pgloader migration ==="
    echo "Source: mysql.udc-bot-dev.svc.cluster.local/udcbot"
    echo "Target: postgresql.udc-bot-dev.svc.cluster.local/udcbot"
    echo "==================================="

    pgloader /tmp/migration.load

    echo "=== Migration complete ==="
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-to-postgresql-migration
  namespace: udc-bot-dev
  labels:
    app.kubernetes.io/name: pgloader-migration
    app.kubernetes.io/part-of: udc-bot
    environment: dev
spec:
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgloader-migration
        app.kubernetes.io/part-of: udc-bot
        environment: dev
    spec:
      containers:
        - name: pgloader
          image: ghcr.io/dimitri/pgloader:latest
          command: ["/bin/sh"]
          args: ["/config/run-migration.sh"]
          env:
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: password
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: password
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
      volumes:
        - name: config
          configMap:
            name: pgloader-config
            defaultMode: 0755
      restartPolicy: Never
  backoffLimit: 2
