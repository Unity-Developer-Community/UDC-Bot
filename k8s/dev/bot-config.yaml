# Settings.json template for UDC-Bot dev environment.
# Secrets are substituted at pod startup by the render-config init container via envsubst.
apiVersion: v1
kind: ConfigMap
metadata:
    name: bot-config
    namespace: udc-bot-dev
    labels:
        app.kubernetes.io/name: udc-bot
        app.kubernetes.io/part-of: udc-bot
        environment: dev
data:
    Settings.json: |
        {
            "token": "${BOT_TOKEN}",
            "DbConnectionString": "Host=postgresql;Port=5432;Database=udcbot;Username=udcbot;Password=${DB_PASSWORD}",
            "invite": "InviteLink", // Currently Unused
            /*Server Info*/
            "serverRootPath": "./SERVER",
            "assetsRootPath": "./Assets",
            /* Base info */
            "prefix": "!",
            "Administrator": "838030241103478805",
            "ModeratorRoleId": "769010537119088690",
            "guildId": "566084539664039938", // Replace with your servers guild ID
            /* All assignable roles as of 29/04/21 */
            "UserAssignableRoles": {
                "desc": "All normal user assignable roles available",
                "roles": [
                "Audio-Engineers",
                "Technical-Artists",
                "Animators",
                "3D-Artists",
                "2D-Artists",
                "XR-Developers",
                "Programmers",
                "Writers",
                "Game-Designers",
                "Generalists",
                "Hobbyists",
                "Students"
                ]
            },
            /* Channel IDs for certain channels. */
            "generalChannel": { // Off-topic
                "desc": "General-Chat Channel",
                "id": "566084539664039944"
            },
            "botAnnouncementChannel": { // Most bot logs will go here
                "desc": "Bot-Announcement Channel",
                "id": "567628191221547008"
            },
            "announcementsChannel": { // Not used by bot
                "desc": "General Announcement Channel",
                "id": "838030934728376320" // Currently Unused 29/04/21
            },
            "botCommandsChannel": {
                "desc": "Bot-Commands Channel",
                "id": "599583999379243008"
            },
            "unityNewsChannel": {
                "desc": "Unity News Channel",
                "id": "1022102744552710154"
            },
            "UnityReleasesChannel": {
                "desc": "Unity Releases Channel",
                "id": "1022102744552710154"
            },
            "RulesChannel": {
                "desc": "The Rules",
                "id": "825932695698669618"
            },
            "ReportedMessageChannel": {
                "desc": "Reported Message Channel",
                "id": "567628191221547008"
            },
            /* Role Ids */
            "mutedRoleID": "682432235445682194",
            "SubsReleasesRoleId": "769870886743703584",
            "TipsUserRoleId": "603187742096228374",
            "TipsAuthorRoleId": "603187742096228374",
            /*Complaints Channels Stuff*/
            "complaintCategoryId": "874631331810799626",
            "complaintChannelPrefix": "Complaint",
            /*Commands Configuration*/
            "wikipediaSearchPage": "https://en.wikipedia.org/w/api.php?action=query&format=json&prop=extracts|info&generator=prefixsearch&redirects=1&converttitles=1&utf8=1&formatversion=2&exchars=750&exintro=1&explaintext=1&exsectionformat=plain&inprop=url&gpslimit=5&gpsprofile=fuzzy&gpssearch=",
            "IPGeolocationAPIKey": "${IPGEO_KEY}",
            "WeatherAPIKey": "${WEATHER_KEY}",
            "FlightAPIKey": "${FLIGHT_KEY}",
            "FlightAPISecret": "${FLIGHT_SECRET}",
            "AirLabAPIKey": "${AIRLAB_KEY}",
            /* Job Recruitment Service */
            "RecruitmentChannel": {
                "desc": "Channel for job postings",
                "id": "1134672948356202678"
            },
            "RecruitmentServiceEnabled": true,
            "TagLookingToHire": "1134673961779724480",
            "TagLookingForWork": "1134673990993051658",
            "TagUnpaidCollab": "1134674009292804117",
            "TagPositionFilled": "1134674041450545283",
            /* Unity Help Service */
            "UnityHelpBabySitterEnabled": true,
            "genericHelpChannel": { // Unity-help
                "desc": "Unity-Help Channel",
                "id": "1028254982748778516"
            },
            "TagUnitHelpResolvedTag": "1028255134356086784",
            "IntroductionChannel": {
                "desc": "Introduction Channel",
                "id": "1198575542467838044"
            },
            "IntroductionWatcherServiceEnabled": true,
            "UserModuleSlapObjectsTable": "Settings/udc-slap.txt",
            "UserModuleSlapChoices": [
                "developer manual",
                "devonlepment server"
            ],
            "UserModuleSlapFails": [
                "developing a rash",
                "developing a skin condition"
            ],
            "TipImageDirectory": "tips",
            "BirthdayAnnouncementEnabled": true,
            "BirthdayCheckIntervalMinutes": 1,
            "BirthdayAnnouncementChannel": {
                "desc": "Channel for birthday announcements",
                "id": "566084539664039944"
            }
        }
