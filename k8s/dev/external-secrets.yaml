---
# PostgreSQL password — from 1Password "PostgreSQL Server - Dev"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgresql-credentials
  namespace: udc-bot-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: postgresql-credentials
  data:
    - secretKey: password
      remoteRef:
        key: "PostgreSQL Server - Dev"
        property: password
---
# Discord bot token — from 1Password "Bot Token - Dev"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: discord-bot-token
  namespace: udc-bot-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: discord-bot-token
  data:
    - secretKey: identifiant
      remoteRef:
        key: "Bot Token - Dev"
        property: identifiant
---
# pgAdmin login password — from 1Password "pgAdmin - Dev"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pgadmin-credentials
  namespace: udc-bot-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: pgadmin-credentials
  data:
    - secretKey: password
      remoteRef:
        key: "pgAdmin - Dev"
        property: password
---
# Bot API keys — from various 1Password items
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bot-api-keys
  namespace: udc-bot-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: bot-api-keys
  data:
    - secretKey: weather-api-key
      remoteRef:
        key: "OpenWeather"
        property: credential
    - secretKey: ipgeo-api-key
      remoteRef:
        key: "IP Geolocation"
        property: credential
    - secretKey: flight-api-key
      remoteRef:
        key: "FlightAPI"
        property: api_key
    - secretKey: flight-api-secret
      remoteRef:
        key: "FlightAPI"
        property: api_secret
    - secretKey: airlab-api-key
      remoteRef:
        key: "AirlabAPI"
        property: api_key
