---
# PostgreSQL password — from 1Password "PostgreSQL Server - Dev"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgresql-credentials
  namespace: udc-bot-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: postgresql-credentials
  data:
    - secretKey: password
      remoteRef:
        key: "PostgreSQL Server - Dev"
        property: password
---
