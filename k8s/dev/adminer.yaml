---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
  namespace: udc-bot-dev
  labels:
    app.kubernetes.io/name: adminer
    app.kubernetes.io/part-of: udc-bot
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: adminer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adminer
        app.kubernetes.io/part-of: udc-bot
        environment: dev
    spec:
      containers:
        - name: adminer
          image: adminer:4
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: ADMINER_DEFAULT_SERVER
              value: postgresql
            - name: ADMINER_DESIGN
              value: dracula
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: adminer
  namespace: udc-bot-dev
  labels:
    app.kubernetes.io/name: adminer
    app.kubernetes.io/part-of: udc-bot
    environment: dev
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: adminer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adminer
  namespace: udc-bot-dev
  labels:
    app.kubernetes.io/name: adminer
    app.kubernetes.io/part-of: udc-bot
    environment: dev
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - adminer.dev.bot.udc.ovh
      secretName: adminer-dev-tls
  rules:
    - host: adminer.dev.bot.udc.ovh
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: adminer
                port:
                  number: 80
