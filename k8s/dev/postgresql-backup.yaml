# PostgreSQL backup using prodrigestivill/postgres-backup-local — handles daily schedule internally.
# Dumps go to S3 bucket "udc-bot-postgresql-backups" with 90-day retention via S3 lifecycle.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql-backup
  namespace: udc-bot-dev
  labels:
    app.kubernetes.io/name: postgresql-backup
    app.kubernetes.io/part-of: udc-bot
    environment: dev
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql-backup
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql-backup
        app.kubernetes.io/part-of: udc-bot
        environment: dev
    spec:
      containers:
        - name: postgresql-backup
          image: prodrigestivill/postgres-backup-local:16-alpine-d257e5d
          env:
            - name: POSTGRES_HOST
              value: postgresql
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: udcbot
            - name: POSTGRES_USER
              value: udcbot
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: password
            - name: SCHEDULE
              value: "@daily"
            - name: BACKUP_KEEP_DAYS
              value: "90"
            - name: BACKUP_DIR
              value: /backups
          volumeMounts:
            - name: backup-data
              mountPath: /backups
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: backup-data
          emptyDir: {}
