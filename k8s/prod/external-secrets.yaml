---
# PostgreSQL password — from 1Password "PostgreSQL Server - Prod"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgresql-credentials
  namespace: udc-bot-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: postgresql-credentials
  data:
    - secretKey: password
      remoteRef:
        key: "PostgreSQL Server - Prod"
        property: password
---
# Discord bot token — from 1Password "Bot Token - Prod"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: discord-bot-token
  namespace: udc-bot-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: discord-bot-token
  data:
    - secretKey: identifiant
      remoteRef:
        key: "Bot Token - Prod"
        property: identifiant
---
# pgAdmin login password — from 1Password "pgAdmin - Prod"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pgadmin-credentials
  namespace: udc-bot-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: pgadmin-credentials
  data:
    - secretKey: password
      remoteRef:
        key: "pgAdmin - Prod"
        property: password
---
# Bot API keys — same keys shared between dev and prod
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bot-api-keys
  namespace: udc-bot-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: bot-api-keys
  data:
    - secretKey: weather-api-key
      remoteRef:
        key: "OpenWeather"
        property: credential
    - secretKey: ipgeo-api-key
      remoteRef:
        key: "IP Geolocation"
        property: credential
    - secretKey: flight-api-key
      remoteRef:
        key: "FlightAPI"
        property: api_key
    - secretKey: flight-api-secret
      remoteRef:
        key: "FlightAPI"
        property: api_secret
    - secretKey: airlab-api-key
      remoteRef:
        key: "AirlabAPI"
        property: api_key
---
# AWS credentials for S3 backups — from 1Password "AWS Backup Credentials"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgresql-backup-credentials
  namespace: udc-bot-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: postgresql-backup-credentials
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: "AWS Backup Credentials"
        property: access-key-id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: "AWS Backup Credentials"
        property: secret-access-key
