---
# MySQL root password — from 1Password "MySQL Server - Root User - Prod"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mysql-credentials
  namespace: udc-bot-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: mysql-credentials
  data:
    - secretKey: password
      remoteRef:
        key: "MySQL Server - Root User - Prod"
        property: password
---
# MySQL udcbot user password — from 1Password "MySQL Server - UDC User - Prod"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mysql-user-credentials
  namespace: udc-bot-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: mysql-user-credentials
  data:
    - secretKey: password
      remoteRef:
        key: "MySQL Server - UDC User - Prod"
        property: password
---
# Discord bot token — from 1Password "Bot Token - Prod"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: discord-bot-token
  namespace: udc-bot-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: discord-bot-token
  data:
    - secretKey: identifiant
      remoteRef:
        key: "Bot Token - Prod"
        property: identifiant
---
# AWS credentials for MySQL backups to S3 (shared with dev)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mysql-backup-credentials
  namespace: udc-bot-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: mysql-backup-credentials
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: "AWS Backup Credentials"
        property: access-key-id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: "AWS Backup Credentials"
        property: secret-access-key
---
# Bot API keys — same keys shared between dev and prod
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bot-api-keys
  namespace: udc-bot-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: bot-api-keys
  data:
    - secretKey: weather-api-key
      remoteRef:
        key: "OpenWeather"
        property: credential
    - secretKey: ipgeo-api-key
      remoteRef:
        key: "IP Geolocation"
        property: credential
    - secretKey: flight-api-key
      remoteRef:
        key: "FlightAPI"
        property: api_key
    - secretKey: flight-api-secret
      remoteRef:
        key: "FlightAPI"
        property: api_secret
    - secretKey: airlab-api-key
      remoteRef:
        key: "AirlabAPI"
        property: api_key
