# Settings.json template for UDC-Bot prod environment.
# Secrets are substituted at pod startup by the render-config init container via envsubst.
# TODO: Replace all channel/role/guild IDs with production Discord server values.
apiVersion: v1
kind: ConfigMap
metadata:
    name: bot-config
    namespace: udc-bot-prod
    labels:
        app.kubernetes.io/name: udc-bot
        app.kubernetes.io/part-of: udc-bot
        environment: prod
data:
    Settings.json: |
        {
            "token": "${BOT_TOKEN}",
            "DbConnectionString": "server=mysql;port=3306;database=udcbot;user id=udcbot;Password=${DB_PASSWORD};SSL Mode=None;Allow User Variables=True;AllowPublicKeyRetrieval=True",
            "invite": "InviteLink",
            "serverRootPath": "./SERVER",
            "prefix": "!",
            "Administrator": "TODO_ADMIN_ROLE_ID",
            "ModeratorRoleId": "TODO_MODERATOR_ROLE_ID",
            "guildId": "TODO_GUILD_ID",
            "UserAssignableRoles": {
                "desc": "All normal user assignable roles available",
                "roles": [
                "Audio-Engineers",
                "Technical-Artists",
                "Animators",
                "3D-Artists",
                "2D-Artists",
                "XR-Developers",
                "Programmers",
                "Writers",
                "Game-Designers",
                "Generalists",
                "Hobbyists",
                "Students"
                ]
            },
            "generalChannel": {
                "desc": "General-Chat Channel",
                "id": "TODO_GENERAL_CHANNEL_ID"
            },
            "botAnnouncementChannel": {
                "desc": "Bot-Announcement Channel",
                "id": "TODO_BOT_ANNOUNCEMENT_CHANNEL_ID"
            },
            "announcementsChannel": {
                "desc": "General Announcement Channel",
                "id": "TODO_ANNOUNCEMENTS_CHANNEL_ID"
            },
            "botCommandsChannel": {
                "desc": "Bot-Commands Channel",
                "id": "TODO_BOT_COMMANDS_CHANNEL_ID"
            },
            "unityNewsChannel": {
                "desc": "Unity News Channel",
                "id": "TODO_UNITY_NEWS_CHANNEL_ID"
            },
            "UnityReleasesChannel": {
                "desc": "Unity Releases Channel",
                "id": "TODO_UNITY_RELEASES_CHANNEL_ID"
            },
            "RulesChannel": {
                "desc": "The Rules",
                "id": "TODO_RULES_CHANNEL_ID"
            },
            "ReportedMessageChannel": {
                "desc": "Reported Message Channel",
                "id": "TODO_REPORTED_MESSAGE_CHANNEL_ID"
            },
            "mutedRoleID": "TODO_MUTED_ROLE_ID",
            "publisherRoleID": "TODO_PUBLISHER_ROLE_ID",
            "SubsReleasesRoleId": "TODO_SUBS_RELEASES_ROLE_ID",
            "TipsUserRoleId": "TODO_TIPS_USER_ROLE_ID",
            "TipsAuthorRoleId": "TODO_TIPS_AUTHOR_ROLE_ID",
            "assetStoreFrontPage": "https://www.assetstore.unity3d.com/en/",
            "complaintCategoryId": "TODO_COMPLAINT_CATEGORY_ID",
            "complaintChannelPrefix": "Complaint",
            "wikipediaSearchPage": "https://en.wikipedia.org/w/api.php?action=query&format=json&prop=extracts|info&generator=prefixsearch&redirects=1&converttitles=1&utf8=1&formatversion=2&exchars=750&exintro=1&explaintext=1&exsectionformat=plain&inprop=url&gpslimit=5&gpsprofile=fuzzy&gpssearch=",
            "IPGeolocationAPIKey": "${IPGEO_KEY}",
            "WeatherAPIKey": "${WEATHER_KEY}",
            "FlightAPIKey": "${FLIGHT_KEY}",
            "FlightAPISecret": "${FLIGHT_SECRET}",
            "AirLabAPIKey": "${AIRLAB_KEY}",
            "AutoThreadChannels": [
                {
                "id": "TODO_AUTO_THREAD_CHANNEL_ID",
                "title": "❔ Question",
                "canArchive": true,
                "titleArchived": "✔️ Answered",
                "firstMessage": "Hey {0}, this thread is just for you!\nYour first message (the one above) will appear in <#TODO_AUTO_THREAD_CHANNEL_ID> so make sure to put the most important points there!\nWhen your questions are answered, please `!close` this thread."
                }
            ],
            "AutoThreadExclusionPrefixes": [
                "!",
                "$",
                "w!"
            ],
            "RecruitmentChannel": {
                "desc": "Channel for job postings",
                "id": "TODO_RECRUITMENT_CHANNEL_ID"
            },
            "RecruitmentServiceEnabled": true,
            "TagLookingToHire": "TODO_TAG_LOOKING_TO_HIRE",
            "TagLookingForWork": "TODO_TAG_LOOKING_FOR_WORK",
            "TagUnpaidCollab": "TODO_TAG_UNPAID_COLLAB",
            "TagPositionFilled": "TODO_TAG_POSITION_FILLED",
            "UnityHelpBabySitterEnabled": true,
            "genericHelpChannel": {
                "desc": "Unity-Help Channel",
                "id": "TODO_GENERIC_HELP_CHANNEL_ID"
            },
            "TagUnitHelpResolvedTag": "TODO_UNITY_HELP_RESOLVED_TAG",
            "ReactRoleServiceEnabled": false,
            "IntroductionChannel": {
                "desc": "Introduction Channel",
                "id": "TODO_INTRODUCTION_CHANNEL_ID"
            },
            "IntroductionWatcherServiceEnabled": true,
            "UserModuleSlapObjectsTable": "Settings/udc-slap.txt",
            "UserModuleSlapChoices": [
                "developer manual",
                "devonlepment server"
            ],
            "UserModuleSlapFails": [
                "developing a rash",
                "developing a skin condition"
            ],
            "TipImageDirectory": "tips",
            "BirthdayAnnouncementEnabled": true,
            "BirthdayCheckIntervalMinutes": 1,
            "BirthdayAnnouncementChannel": {
                "desc": "Channel for birthday announcements",
                "id": "TODO_BIRTHDAY_CHANNEL_ID"
            }
        }
