---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin-servers
  namespace: udc-bot-prod
  labels:
    app.kubernetes.io/name: pgadmin
    app.kubernetes.io/part-of: udc-bot
    environment: prod
data:
  servers.json: |
    {
      "Servers": {
        "1": {
          "Name": "UDC Bot - PostgreSQL (Prod)",
          "Group": "Servers",
          "Host": "postgresql",
          "Port": 5432,
          "MaintenanceDB": "udcbot",
          "Username": "udcbot",
          "SSLMode": "prefer",
          "PassFile": "/tmp/pgpass"
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: udc-bot-prod
  labels:
    app.kubernetes.io/name: pgadmin
    app.kubernetes.io/part-of: udc-bot
    environment: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pgadmin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgadmin
        app.kubernetes.io/part-of: udc-bot
        environment: prod
    spec:
      initContainers:
        - name: create-pgpass
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "postgresql:5432:udcbot:udcbot:${PGPASSWORD}" > /pgpass/pgpass
              chmod 600 /pgpass/pgpass
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: password
          volumeMounts:
            - name: pgpass
              mountPath: /pgpass
          securityContext:
            allowPrivilegeEscalation: false
      containers:
        - name: pgadmin
          image: dpage/pgadmin4:8.14
          ports:
            - containerPort: 80
              protocol: TCP
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              value: admin@udc.ovh
            - name: PGADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pgadmin-credentials
                  key: password
            - name: PGADMIN_SERVER_JSON_FILE
              value: /pgadmin4/servers.json
          volumeMounts:
            - name: servers-config
              mountPath: /pgadmin4/servers.json
              subPath: servers.json
              readOnly: true
            - name: pgpass
              mountPath: /tmp/pgpass
              subPath: pgpass
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /misc/ping
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: servers-config
          configMap:
            name: pgadmin-servers
        - name: pgpass
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: pgadmin
  namespace: udc-bot-prod
  labels:
    app.kubernetes.io/name: pgadmin
    app.kubernetes.io/part-of: udc-bot
    environment: prod
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app.kubernetes.io/name: pgadmin
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pgadmin
  namespace: udc-bot-prod
  labels:
    app.kubernetes.io/name: pgadmin
    app.kubernetes.io/part-of: udc-bot
    environment: prod
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: default-ip-allowlist@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - pgadmin.bot.udc.ovh
      secretName: pgadmin-prod-tls
  rules:
    - host: pgadmin.bot.udc.ovh
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pgadmin
                port:
                  number: 80
