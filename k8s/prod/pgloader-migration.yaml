---
# TEMPORARY: pgloader migration Job. Remove after migration is complete.
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgloader-config
  namespace: udc-bot-prod
  labels:
    app.kubernetes.io/name: pgloader-migration
    app.kubernetes.io/part-of: udc-bot
    environment: prod
data:
  run-migration.sh: |
    #!/bin/sh
    set -e

    # URL-encode passwords using pure shell (handles special chars like %)
    urlencode() {
      printf '%s' "$1" | od -An -tx1 | tr ' ' '%' | tr -d '\n' | sed 's/^%//'
    }

    MYSQL_PASS_ENCODED=$(urlencode "${MYSQL_PASSWORD}")
    PG_PASS_ENCODED=$(urlencode "${POSTGRES_PASSWORD}")

    cat > /tmp/migration.load <<'PGEOF'
    LOAD DATABASE
      FROM mysql://MYSQL_PLACEHOLDER@mysql.udc-bot-prod.svc.cluster.local:3306/udcbot
      INTO postgresql://PG_PLACEHOLDER@postgresql.udc-bot-prod.svc.cluster.local:5432/udcbot

    WITH data only,
        reset sequences,
        workers = 2, concurrency = 1

    SET maintenance_work_mem to '128MB'

    INCLUDING ONLY TABLE NAMES MATCHING ~/users|casino_users|token_transactions/

    BEFORE LOAD DO
      $$ TRUNCATE users, casino_users, token_transactions CASCADE; $$
    ;
    PGEOF

    # Substitute credentials into the config (avoid shell expansion in heredoc)
    sed -i "s|MYSQL_PLACEHOLDER|root:${MYSQL_PASS_ENCODED}|" /tmp/migration.load
    sed -i "s|PG_PLACEHOLDER|udcbot:${PG_PASS_ENCODED}|" /tmp/migration.load

    echo "=== Starting pgloader migration (PROD) ==="
    echo "Source: mysql.udc-bot-prod.svc.cluster.local/udcbot"
    echo "Target: postgresql.udc-bot-prod.svc.cluster.local/udcbot"
    echo "============================================"

    pgloader /tmp/migration.load

    echo "=== Migration complete ==="
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-to-postgresql-migration
  namespace: udc-bot-prod
  labels:
    app.kubernetes.io/name: pgloader-migration
    app.kubernetes.io/part-of: udc-bot
    environment: prod
spec:
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgloader-migration
        app.kubernetes.io/part-of: udc-bot
        environment: prod
    spec:
      containers:
        - name: pgloader
          image: ghcr.io/dimitri/pgloader:latest
          command: ["/bin/sh"]
          args: ["/config/run-migration.sh"]
          env:
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: password
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: password
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
      volumes:
        - name: config
          configMap:
            name: pgloader-config
            defaultMode: 0755
      restartPolicy: Never
  backoffLimit: 2
