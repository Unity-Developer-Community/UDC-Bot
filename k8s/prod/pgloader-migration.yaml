---
# TEMPORARY: pgloader migration Job. Remove after migration is complete.
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgloader-config
  namespace: udc-bot-prod
  labels:
    app.kubernetes.io/name: pgloader-migration
    app.kubernetes.io/part-of: udc-bot
    environment: prod
data:
  run-migration.sh: |
    #!/bin/sh
    set -e

    cat > /tmp/migration.load <<PGEOF
    LOAD DATABASE
      FROM mysql://root:${MYSQL_PASSWORD}@mysql.udc-bot-prod.svc.cluster.local:3306/udcbot
      INTO postgresql://udcbot:${POSTGRES_PASSWORD}@postgresql.udc-bot-prod.svc.cluster.local:5432/udcbot

    WITH data only,
        reset sequences,
        workers = 2, concurrency = 1

    SET maintenance_work_mem to '128MB'

    INCLUDING ONLY TABLE NAMES MATCHING ~/users|casino_users|token_transactions/

    ALTER SCHEMA 'udcbot' RENAME TO 'public'

    BEFORE LOAD DO
      \$\$ ALTER TABLE users ADD COLUMN IF NOT EXISTS birthday timestamp; \$\$,
      \$\$ DROP TABLE IF EXISTS token_transactions CASCADE; \$\$,
      \$\$ CREATE TABLE token_transactions (id serial PRIMARY KEY, userid varchar(32) NOT NULL, amount bigint NOT NULL, type integer NOT NULL DEFAULT 0, detailsjson text DEFAULT NULL, createdat timestamptz NOT NULL DEFAULT CURRENT_TIMESTAMP); \$\$,
      \$\$ TRUNCATE users, casino_users CASCADE; \$\$

    AFTER LOAD DO
      \$\$ ALTER TABLE users DROP COLUMN IF EXISTS birthday; \$\$,
      \$\$ ALTER TABLE token_transactions ADD COLUMN targetuserid varchar(32) DEFAULT NULL; \$\$,
      \$\$ ALTER TABLE token_transactions ADD COLUMN transactiontype varchar(50) NOT NULL DEFAULT 'Admin'; \$\$,
      \$\$ ALTER TABLE token_transactions ADD COLUMN description text DEFAULT NULL; \$\$,
      \$\$ UPDATE token_transactions SET transactiontype = CASE type WHEN 0 THEN 'TokenInitialisation' WHEN 1 THEN 'DailyReward' WHEN 2 THEN 'Gift' WHEN 3 THEN 'Game' WHEN 4 THEN 'Admin' ELSE 'Admin' END, description = detailsjson; \$\$,
      \$\$ ALTER TABLE token_transactions DROP COLUMN type; \$\$,
      \$\$ ALTER TABLE token_transactions DROP COLUMN detailsjson; \$\$,
      \$\$ CREATE INDEX IF NOT EXISTS idx_user_created ON token_transactions (userid, createdat); \$\$,
      \$\$ SELECT setval('token_transactions_id_seq', COALESCE((SELECT MAX(id) FROM token_transactions), 1)); \$\$
    ;
    PGEOF

    echo "=== Starting pgloader migration (PROD) ==="
    echo "Source: mysql.udc-bot-prod.svc.cluster.local/udcbot"
    echo "Target: postgresql.udc-bot-prod.svc.cluster.local/udcbot"
    echo "============================================"

    pgloader /tmp/migration.load

    echo "=== Migration complete ==="
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-to-postgresql-migration
  namespace: udc-bot-prod
  labels:
    app.kubernetes.io/name: pgloader-migration
    app.kubernetes.io/part-of: udc-bot
    environment: prod
spec:
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgloader-migration
        app.kubernetes.io/part-of: udc-bot
        environment: prod
    spec:
      containers:
        - name: pgloader
          image: ghcr.io/dimitri/pgloader:latest
          command: ["/bin/sh"]
          args: ["/config/run-migration.sh"]
          env:
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: password
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: password
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
      volumes:
        - name: config
          configMap:
            name: pgloader-config
            defaultMode: 0755
      restartPolicy: Never
  backoffLimit: 2
