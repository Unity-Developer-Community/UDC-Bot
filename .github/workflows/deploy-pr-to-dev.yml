name: Deploy PR to Dev

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to deploy"
        required: true
        type: number

permissions:
  contents: write
  packages: write
  pull-requests: read
  issues: write

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.pr.outputs.sha }}
      short_sha: ${{ steps.pr.outputs.short_sha }}
    steps:
      - name: Get PR info
        id: pr
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            if (pr.state !== 'open') {
              core.setFailed(`PR #${prNumber} is not open (state: ${pr.state})`);
              return;
            }
            core.setOutput('sha', pr.head.sha);
            core.setOutput('short_sha', pr.head.sha.substring(0, 7));

  deploy:
    needs: validate
    uses: ./.github/workflows/build-and-deploy.yml
    with:
      image_name: udc-bot-dev
      manifest_path: k8s/dev/bot.yaml
      checkout_ref: ${{ needs.validate.outputs.sha }}
      manifest_ref: dev
      commit_message: "chore(k8s): deploy PR #${{ inputs.pr_number }} to dev ({sha})"
    permissions:
      contents: write
      packages: write

  notify:
    needs: [validate, deploy]
    if: always()
    name: Notify PR
    runs-on: ubuntu-latest
    steps:
      - name: Post success comment
        if: needs.deploy.result == 'success'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          SHORT_SHA: ${{ needs.validate.outputs.short_sha }}
          REPO_OWNER: ${{ github.repository_owner }}
        with:
          script: |
            const { PR_NUMBER, SHORT_SHA, REPO_OWNER } = process.env;
            const owner = REPO_OWNER.toLowerCase();
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(PR_NUMBER),
              body: `✅ PR deployed to dev!\n\nImage: \`ghcr.io/${owner}/udc-bot-dev:${SHORT_SHA}\`\nArgoCD will sync shortly.`,
            });

      - name: Post failure comment
        if: needs.deploy.result == 'failure'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          script: |
            const { PR_NUMBER } = process.env;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(PR_NUMBER),
              body: `❌ Deploy to dev failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`,
            });
