name: "Build PR for Dev Deploy"

on:
  issue_comment:
    types: [created]

# No contents:write — untrusted PR code cannot compromise the repository
permissions:
  packages: write
  pull-requests: read
  issues: write
  actions: read

jobs:
  build:
    if: >-
      github.event.issue.pull_request
      && github.event.comment.body == '/deploy_dev'
      && contains(fromJSON('["MEMBER","COLLABORATOR","OWNER"]'), github.event.comment.author_association)
    name: Build PR Image
    runs-on: ubuntu-latest
    steps:
      - name: Get PR info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('sha', pr.head.sha);
            core.setOutput('short_sha', pr.head.sha.substring(0, 7));

      - name: Add rocket reaction
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/unity-developer-community/udc-bot-dev:${{ steps.pr.outputs.short_sha }}
            ghcr.io/unity-developer-community/udc-bot-dev:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save build metadata
        run: |
          mkdir -p /tmp/metadata
          echo "${{ steps.pr.outputs.short_sha }}" > /tmp/metadata/short_sha.txt
          echo "${{ github.event.issue.number }}" > /tmp/metadata/pr_number.txt

      - name: Upload metadata
        uses: actions/upload-artifact@v4
        with:
          name: deploy-metadata
          path: /tmp/metadata/
          retention-days: 1

      - name: Post build failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ Image build failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.',
            });
