name: Deploy Prod

on:
  push:
    branches: [master]
    paths-ignore:
      - "k8s/**"
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy to Prod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/unity-developer-community/udc-bot:${{ steps.sha.outputs.short }}
            ghcr.io/unity-developer-community/udc-bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update manifest image tag
        run: |
          sed -i "s|image: ghcr.io/unity-developer-community/udc-bot:.*|image: ghcr.io/unity-developer-community/udc-bot:${{ steps.sha.outputs.short }}|" k8s/prod/bot.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/prod/bot.yaml
          git diff --cached --quiet || git commit -m "chore(k8s): update prod image to ${{ steps.sha.outputs.short }}"
          git push
