name: Deploy Dev

on:
  push:
    branches: [dev]
    paths-ignore:
      - "k8s/**"
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    uses: ./.github/workflows/build-and-deploy.yml
    with:
      image_name: udc-bot-dev
      manifest_path: k8s/dev/bot.yaml
      checkout_ref: dev
      commit_message: "chore(k8s): update dev image to {sha}"
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
    permissions:
      contents: write
      packages: write
