name: PR Deploy Instructions

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  add-comment:
    name: Add deployment instructions
    runs-on: ubuntu-latest
    steps:
      - name: Add deploy comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '### 🚀 Deploy this PR',
                '',
                `To deploy this branch to the **dev** environment, go to the [Deploy PR to Dev](${context.payload.repository.html_url}/actions/workflows/deploy-pr-to-dev.yml) workflow and click **Run workflow** with this PR number.`,
                '',
                'This will build a Docker image from your branch, push it to GHCR, and trigger an ArgoCD sync.',
              ].join('\n'),
            });
